# subagent-orchestrator tasks.toml
#
# v0.1 input source. Each [[task]] entry is one unit of work for the
# orchestrator to dispatch. The orchestrator reads this file on startup
# and processes tasks in declaration order, respecting per-task
# `depends_on` if set.
#
# Schema (see ../PROJECT_PLAN.md §3 milestone M1):
#
# [[task]]
# id              = "<short kebab-case id>"            # required
# title           = "<one-line task title>"            # required
# prompt          = "<self-contained prompt body>"    # required
# disposition     = "auto"                              # auto | local | ultraplan | autofix | web | claude-mention
# repo            = "subagentapps/managed-subagents"   # required for non-local dispositions
# branch          = "main"                              # base branch for the work
# label           = "orchestrator"                      # GitHub label to apply
# automerge       = false                               # off in v0.1; v0.3 enables
# deep_review     = false                               # if true, run /ultrareview after /review
# depends_on      = []                                  # list of task ids to complete first
#
# Example below is commented out. Uncomment / replace when wiring real tasks.
#
# [[task]]
# id          = "example-001"
# title       = "Add a Deno comparison to the bun installation guide"
# prompt      = """
# Open scripts/install/bun-installation-guide.md and add a section
# titled '## Deno alternative' with installation, equivalence to npm
# scripts, and the one known incompatibility (better-sqlite3 needs
# special handling). Keep under 40 lines.
# """
# disposition = "claude-mention"
# repo        = "subagentapps/managed-subagents"
# branch      = "main"
# label       = "orchestrator"

[[task]]
id = "wd-1-viewport"
title = "Webapp redesign Task 1: viewport meta + global resets"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 1 EXACTLY as written (steps 1-4). Modify webapp/index.html and webapp/src/styles.css. Commit with the exact commit message from step 4. Open a draft PR."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"

[[task]]
id = "wd-2-vitest"
title = "Webapp redesign Task 2: vitest + BUILD_META"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 2 EXACTLY as written (steps 1-8). Adds vitest devDeps + creates webapp/src/data/build-meta.ts and its test. The test must FAIL before the source is written (verify in step 5), then PASS (step 7). Commit per step 8. Open a draft PR."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"
depends_on = ["wd-1-viewport"]

[[task]]
id = "wd-3-hero"
title = "Webapp redesign Task 3: brutalist terminal Hero section"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 3 EXACTLY as written (steps 1-6). TDD: failing test first (step 1-2), then CSS + tsx (step 3-4), verify pass (step 5), commit (step 6). Open a draft PR."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"
depends_on = ["wd-2-vitest"]

[[task]]
id = "wd-4-stack"
title = "Webapp redesign Task 4: Stack section (3 ASCII-bordered cards)"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 4 EXACTLY as written (steps 1-6). TDD pattern. Open a draft PR."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"
depends_on = ["wd-3-hero"]

[[task]]
id = "wd-5-selfref"
title = "Webapp redesign Task 5: SelfRef section (build-meta counter)"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 5 EXACTLY as written (steps 1-6). TDD pattern; consumes BUILD_META from Task 2. Open a draft PR."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"
depends_on = ["wd-4-stack"]

[[task]]
id = "wd-6-footer"
title = "Webapp redesign Task 6: Footer section"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 6 EXACTLY as written (steps 1-3). No test for this one - pure presentation. Open a draft PR."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"
depends_on = ["wd-5-selfref"]

[[task]]
id = "wd-7-compose"
title = "Webapp redesign Task 7: compose App.tsx + design tokens"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 7 EXACTLY as written (steps 1-6). Replaces App.tsx + App.module.css contents. Step 3 runs all vitest tests, step 4 typechecks, step 5 runs vite build - all must pass before commit (step 6). Open a draft PR."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"
depends_on = ["wd-6-footer"]

[[task]]
id = "wd-8-playwright"
title = "Webapp redesign Task 8: Playwright iPhone 16 Pro Max smoke tests"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 8 EXACTLY as written (steps 1-7). Installs @playwright/test + chromium + webkit; creates playwright config + 4 e2e tests across 2 viewports = 8 passing total before commit. Open a draft PR."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"
depends_on = ["wd-7-compose"]

[[task]]
id = "wd-9-deploy"
title = "Webapp redesign Task 10: deploy to Cloudflare + verify live"
prompt = "Open docs/superpowers/plans/2026-04-27-webapp-brutalist-mobile.md and execute Task 10 EXACTLY as written (steps 1-5). Runs npm run build + npx wrangler deploy from webapp/, verifies all three URLs return 200, appends a deploy entry to subagent-orchestrator/docs/cloudflare-deploy-record.md. Open a PR. Skip Task 9 (manual visual review). The deploy is the goal; the PR is just the record."
disposition = "web"
repo = "subagentapps/managed-subagents"
label = "webapp-redesign"
depends_on = ["wd-8-playwright"]
