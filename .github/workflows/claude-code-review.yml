name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Skip auto-review on PRs that ONLY touch the paths below.
    # Lockfiles, snapshot images, and pure-text-doc dirs aren't worth
    # ~$1 of Opus per review. If a PR touches *any* file outside these
    # paths, the review still runs.
    paths-ignore:
      # Lockfiles + binaries — Opus can't review autogen meaningfully.
      - "**/package-lock.json"
      - "**/pnpm-lock.yaml"
      - "**/yarn.lock"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"
      - "**/*.ico"
      # GitHub config that doesn't benefit from review
      - ".github/CODEOWNERS"
      - ".github/dependabot.yml"
      - "**/CHANGELOG.md"
      - "subagent-commands/whats-new/**/*.png"
      # Spec / project-memory docs — text content where review found 0
      # actionable issues across PRs #10, #13, #18, #20 (~$4.87 burned).
      # Code PRs still get reviewed; pure-docs PRs in these dirs skip.
      - "**/docs/**"
      - "subagent-orchestrator/CLAUDE.md"
      - "subagent-orchestrator/PROJECT_PLAN.md"
      - "**/M*-*.md"
      - "subagent-mcp-servers/README.md"
      - "subagent-orchestrator/docs/**"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: '--model claude-opus-4-7'
          # Use Opus 4.7 for higher-quality review against the user's 20× Max plan.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

